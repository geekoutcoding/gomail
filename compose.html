<!DOCTYPE html>
<html>
<head>
  <title>GoMail - Compose</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Compose Message</h1>
    <nav>
      <a href="inbox.html">Inbox</a>
      <a href="#" id="logout">Logout</a>
    </nav>
    <form id="composeForm">
      <input type="email" id="to" placeholder="To (e.g., friend@go-mail-app.web.app)" required>
      <input type="text" id="subject" placeholder="Subject" required>
      <textarea id="body" placeholder="Message" rows="10" required></textarea>
      <button type="submit">Send</button>
    </form>
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
  </div>
  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { collection, query, where, getDocs, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    auth.onAuthStateChanged((user) => {
      if (!user) window.location.href = 'login.html';
    });

    document.getElementById('composeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const to = document.getElementById('to').value;
      const subject = document.getElementById('subject').value;
      const body = document.getElementById('body').value;
      const errorDiv = document.getElementById('error');
      const successDiv = document.getElementById('success');
      errorDiv.textContent = '';
      successDiv.textContent = '';

      // Validate domain
      if (!to.endsWith('@go-mail-app.web.app')) {
        errorDiv.textContent = 'Recipient must be on go-mail-app.web.app';
        return;
      }

      const user = auth.currentUser;
      if (!user) return;

      try {
        // Find recipient user by email
        const usersRef = collection(db, 'users');
        const q = query(usersRef, where('email', '==', to));
        const snapshot = await getDocs(q);
        if (snapshot.empty) {
          errorDiv.textContent = 'Recipient not found';
          return;
        }
        const recipientDoc = snapshot.docs[0];
        const recipientId = recipientDoc.id;
        const recipientName = recipientDoc.data().name;

        // Get sender info (you might store it in localStorage or fetch again)
        const senderSnapshot = await getDocs(query(usersRef, where('uid', '==', user.uid)));
        const senderDoc = senderSnapshot.docs[0];
        const senderName = senderDoc.data().name;

        // Send message
        await addDoc(collection(db, 'messages'), {
          senderId: user.uid,
          senderEmail: user.email,
          senderName: senderName,
          recipientId: recipientId,
          recipientEmail: to,
          recipientName: recipientName,
          subject,
          body,
          timestamp: serverTimestamp(),
          isRead: false
        });

        successDiv.textContent = 'Message sent!';
        document.getElementById('composeForm').reset();
      } catch (error) {
        errorDiv.textContent = error.message;
      }
    });

    document.getElementById('logout').addEventListener('click', async (e) => {
      e.preventDefault();
      await signOut(auth);
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
